services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - '${POSTGRES_PORT}:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}']
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - '${REDIS_PORT}:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 10

  auth-api:
    build:
      context: .
      dockerfile: auth-api/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      PORT: ${AUTH_API_PORT}
      DATABASE_URL: ${AUTH_DATABASE_URL}
      REDIS_URL: ${AUTH_REDIS_URL}
      AUTH_ACCESS_TOKEN_SECRET: ${AUTH_ACCESS_TOKEN_SECRET}
      AUTH_REFRESH_TOKEN_SECRET: ${AUTH_REFRESH_TOKEN_SECRET}
      AUTH_ACCESS_TOKEN_TTL_SECONDS: ${AUTH_ACCESS_TOKEN_TTL_SECONDS}
      AUTH_REFRESH_TOKEN_TTL_SECONDS: ${AUTH_REFRESH_TOKEN_TTL_SECONDS}
      GOOGLE_CLIENT_ID: ${AUTH_GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${AUTH_GOOGLE_CLIENT_SECRET}
      GOOGLE_CALLBACK_URL: ${AUTH_GOOGLE_CALLBACK_URL}
      PASSKEY_RP_ID: ${AUTH_PASSKEY_RP_ID}
      PASSKEY_RP_NAME: ${AUTH_PASSKEY_RP_NAME}
      PASSKEY_ALLOWED_ORIGINS: ${AUTH_PASSKEY_ALLOWED_ORIGINS}
    ports:
      - '${AUTH_API_PORT}:3001'

  keycloak:
    image: quay.io/keycloak/keycloak:26.2
    command: start-dev
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
    ports:
      - '8080:8080'

  skillbook-api:
    build:
      context: .
      dockerfile: skillbook-api/Dockerfile
    environment:
      PORT: ${SKILLBOOK_API_PORT}
      AUTH_ACCESS_TOKEN_SECRET: ${AUTH_ACCESS_TOKEN_SECRET}
    ports:
      - '${SKILLBOOK_API_PORT}:3002'

  gateway:
    build:
      context: .
      dockerfile: gateway/Dockerfile
    depends_on:
      - auth-api
      - skillbook-api
    environment:
      PORT: ${GATEWAY_PORT}
      AUTH_API_URL: ${AUTH_API_URL}
      SKILL_BOOK_API_URL: ${SKILL_BOOK_API_URL}
    ports:
      - '${GATEWAY_PORT}:3000'

volumes:
  postgres_data:
  postgres_test_data:
