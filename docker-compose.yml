services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  postgres-test:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_TEST_DB}
    ports:
      - "${POSTGRES_TEST_PORT}:5432"
    volumes:
      - postgres_test_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_TEST_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  auth-api:
    build:
      context: .
      dockerfile: auth-api/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PORT: ${AUTH_API_PORT}
      DATABASE_URL: ${AUTH_DATABASE_URL}
      AUTH_ACCESS_TOKEN_SECRET: ${AUTH_ACCESS_TOKEN_SECRET}
      AUTH_REFRESH_TOKEN_SECRET: ${AUTH_REFRESH_TOKEN_SECRET}
      AUTH_ACCESS_TOKEN_TTL_SECONDS: ${AUTH_ACCESS_TOKEN_TTL_SECONDS}
      AUTH_REFRESH_TOKEN_TTL_SECONDS: ${AUTH_REFRESH_TOKEN_TTL_SECONDS}
    ports:
      - "${AUTH_API_PORT}:3001"

  skillbook-api:
    build:
      context: .
      dockerfile: skillbook-api/Dockerfile
    environment:
      PORT: ${SKILLBOOK_API_PORT}
    ports:
      - "${SKILLBOOK_API_PORT}:3002"

  gateway:
    build:
      context: .
      dockerfile: gateway/Dockerfile
    depends_on:
      - auth-api
      - skillbook-api
    environment:
      PORT: ${GATEWAY_PORT}
      AUTH_API_URL: ${AUTH_API_URL}
      SKILL_BOOK_API_URL: ${SKILL_BOOK_API_URL}
    ports:
      - "${GATEWAY_PORT}:3000"

volumes:
  postgres_data:
  postgres_test_data:
